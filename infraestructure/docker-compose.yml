version: '2'
services:
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    hostname: kafka
    ports:
      - "29092:29092"
    environment:
      # KRaft
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Single node settings
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    networks:
      - techmarket-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8086
    networks:
      - techmarket-network

  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    ports:
      - 1025:1025  # SMTP server
      - 8025:8025  # MailHog web interface
    networks:
      - techmarket-network

  keycloak:
    image: 'quay.io/keycloak/keycloak'
    command:
      - start-dev
      - --import-realm
    environment:
      KC_DB: mysql
      KC_DB_URL_HOST: keycloak-mysql
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT: false
      KC_HTTP_ENABLED: true
      KC_HOSTNAME_ADMIN_URL: http://localhost:8181
    ports:
      - "8181:8080"
    depends_on:
      - keycloak-mysql
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import
    networks:
      - techmarket-network

  keycloak-mysql:
    image: 'mirror.gcr.io/mysql:8'
    environment:
      MYSQL_DATABASE: keycloak
      MYSQL_USER: keycloak
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: root
    networks:
      - techmarket-network


  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - techmarket-network

  postgres-inventory:
    container_name: postgres-inventory
    image: postgres:17.9
    environment:
      POSTGRES_DB: inventory-service
      POSTGRES_USER: juliparodi
      POSTGRES_PASSWORD: ${POSTGRE_PASSWORD}
      PGDATA: /data/postgres
    volumes:
      - ./postgres-order:/data/postgres
    expose:
      - "5431"
    ports:
      - "5431:5431"
    command: -p 5431
    restart: unless-stopped
    networks:
      - techmarket-network

  mysql-order:
    container_name: mysql-order
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: order-service
      MYSQL_USER: juliparodi
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./mysql-order:/var/lib/mysql
    expose:
      - "3306"
    ports:
      - "3306:3306"
    restart: unless-stopped
    networks:
      - techmarket-network


  mongo:
    container_name: mongo
    image: mongo:7.0
    restart: always
    ports:
      - "27017:27017"
    expose:
      - "27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: juliadmin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ADMIN_PASSWORD}
      MONGO_JULIP_PASSWORD: ${MONGO_JULIP_PASSWORD}
    volumes:
      - ./mongo-data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d
    networks:
      - techmarket-network


  grafana-lgtm:
    image: 'grafana/otel-lgtm:latest'
    container_name: grafana-lgtm
    ports:
      - '3001:3000'
      - '4317:4317'
      - '4318:4318'
      - "9090:9090"
    networks:
      - techmarket-network

#TECH MARKET MICROSERVICES

  api-gateway:
    image: juliparodi/techmarket:api-gateway-latest
    container_name: api-gateway
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY= TRACE
    depends_on:
      - keycloak
      - grafana-lgtm
    ports:
      - "8084:8084"
    networks:
      - techmarket-network
    extra_hosts:
      - "host.docker.internal:host-gateway"


  product-service:
    container_name: product-service
    image: juliparodi/techmarket:product-service-latest
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - MONGO_JULIP_PASSWORD=${MONGO_JULIP_PASSWORD}
    depends_on:
      - mongo
      - api-gateway
    networks:
      - techmarket-network


  order-service:
    container_name: order-service
    image: juliparodi/techmarket:order-service-latest
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD}
      - JAVA_TOOL_OPTIONS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
    ports:
      - "5005:5005"
    depends_on:
      - mysql-order
      - kafka
      - api-gateway
    networks:
      - techmarket-network

  inventory-service:
    container_name: inventory-service
    image: juliparodi/techmarket:inventory-service-latest
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_PASSWORD=${POSTGRE_PASSWORD}
    ports:
      - "8083:8083"
    depends_on:
      - postgres-inventory
      - api-gateway
      - kafka
    networks:
      - techmarket-network

  notification-service:
    container_name: notification-service
    image: juliparodi/techmarket:notification-service-latest
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - kafka
      - api-gateway
      - mailhog
    networks:
      - techmarket-network



volumes:
  keycloak:
  grafana-date:
  cache:
    driver: local

networks:
  techmarket-network: