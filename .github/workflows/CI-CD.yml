name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [api-gateway, order-service, product-service, inventory-service, notification-service]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Build service with Maven
      run: mvn -pl ${{ matrix.service }} -am clean install

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./${{ matrix.service }}
        push: true
        tags: juliparodi/techmarket:${{ matrix.service }}-${{ github.sha }}, juliparodi/techmarket:${{ matrix.service }}-latest

    - name: Update ECS task definition
      if: matrix.service == 'api-gateway'
      run: |
        SERVICE=${{ matrix.service }}
        IMAGE="juliparodi/techmarket:${SERVICE}-${{ github.sha }}"

        echo "Updating image to $IMAGE"

        # Download current task definition
        aws ecs describe-task-definition \
          --task-definition jp-market-task-definition-v2 \
          --query 'taskDefinition' > task-def.json 
        
        # Clean AWS read-only fields
        cat task-def.json | jq 'del(
          .taskDefinitionArn,
          .revision,
          .status,
          .requiresAttributes,
          .compatibilities,
          .registeredAt,
          .registeredBy
        )' > cleaned-task-def.json

        # Replace image
        jq --arg IMAGE "$IMAGE" \
          '.containerDefinitions[0].image = $IMAGE' \
          cleaned-task-def.json > updated-task-def.json

        # Register new task definition revision
        aws ecs register-task-definition \
          --cli-input-json file://updated-task-def.json 

      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}

    - name: Force ECS deployment
      if: matrix.service == 'api-gateway'
      run: |
        aws ecs update-service \
          --cluster jp-market-cluster \
          --service jp-market-task-definition-v2-service-crorz47x \
          --force-new-deployment \
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}