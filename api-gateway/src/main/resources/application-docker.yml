spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: product-service
              uri: http://product-service:8080
              predicates:
                - Path=/api/product/**

            - id: order-service
              uri: http://order-service:8080
              predicates:
                - Path=/api/order/**

            - id: inventory-service
              uri: http://inventory-service:8080
              predicates:
                - Path=/api/inventory/**,/api/category/**,/api/promotion/**
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/techmarket-realm
server:
  port: 8084

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://grafana-lgtm:4318/v1/traces
      sampling:
        probability: '1.0'
    metrics:
      export:
        otlp:
          endpoint: http://grafana-lgtm:4318/v1/metrics
  endpoint:
    health:
      show-details: always
