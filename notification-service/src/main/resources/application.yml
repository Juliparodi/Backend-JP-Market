management:
  endpoints:
    web:
      exposure:
        include: '*'
  health:
    health:
      show-details: always
    circuitbreakers:
      enabled: 'true'
  otlp:
    metrics:
      export:
        url: http://localhost:4318/v1/metrics
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces
  logging:
    export:
      otlp:
        endpoint: http://localhost:4318/v1/logs
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: '1.0'
spring:
  kafka:
    template:
      default-topic: orderTopic
    consumer:
      group-id: notificationId
      properties:
        spring:
          json:
            type:
              mapping: event:org.techmarket.event.OrderPlacedEvent
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    bootstrap-servers: localhost:29092
  mail:
    host: localhost
    username: techmarketJP@gmail.com
    port: '1025'
    properties:
      mail:
        transport:
          protocol: smtp
        debug: 'true'
        smtp:
          starttls:
            enable: 'true'
          auth: 'true'
    password: Hola1234!
  application:
    name: notification-service
server:
  port: '0'
