spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: product-service
              uri: http://product-service:8082
              predicates:
                - Path=/api/product/**

            - id: order-service
              uri: http://order-service:8081
              predicates:
                - Path=/api/order/**

            - id: inventory-service
              uri: http://inventory-service:8083
              predicates:
                - Path=/api/inventory/**,/api/category/**,/api/promotion/**
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8181/realms/techmarket-realm
          jwk-set-uri: http://keycloak:8080/realms/techmarket-realm/protocol/openid-connect/certs
server:
  port: 8084

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  otlp:
    metrics:
      export:
        url: http://grafana-lgtm:4318/v1/metrics
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://grafana-lgtm:4318/v1/traces
  tracing:
    sampling:
      probability: '1.0'

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50.0
        slowCallRateThreshold: 50.0
        slowCallDurationThreshold: 5000
        waitDurationInOpenState: 30000
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true

    instances:
      product-service:
        baseConfig: default
      order-service:
        baseConfig: default
      inventory-service:
        baseConfig: default
