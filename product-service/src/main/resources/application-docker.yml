spring:
  mongodb:
    uri: mongodb://julianparodi19:${MONGO_JULIP_PASSWORD}@mongo:27017/product-service


management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  otlp:
    metrics:
      export:
        url: http://grafana-lgtm:4318/v1/metrics
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://grafana-lgtm:4318/v1/traces
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: '1.0'

logging:
  level:
    root: INFO
    com.techmarket: DEBUG